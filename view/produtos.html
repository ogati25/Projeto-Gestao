<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="novatech-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Produtos — NovaTech Solutions</title>
    <style>
        /* ── Controles superiores ── */
        .prod-controls { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .prod-controls-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .search-inline { display:flex; align-items:center; gap:8px; background:var(--secondary-color); border:1px solid var(--border-color); border-radius:8px; padding:7px 12px; min-width:260px; }
        .search-inline i { font-size:13px; color:var(--text-muted); }
        .search-inline input { border:none; outline:none; background:transparent; font-size:13px; color:var(--text-primary); width:100%; }
        .search-inline input::placeholder { color:var(--text-muted); }

        /* ── KPIs ── */
        .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
        .kpi-mini { background:var(--secondary-color); border:1px solid var(--border-color); border-radius:10px; padding:16px 18px; box-shadow:var(--card-shadow); display:flex; align-items:center; gap:14px; }
        .kpi-mini-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .kpi-mini-icon i { font-size:18px; color:#fff; }
        .kpi-mini-icon.blue   { background:#3b82f6; }
        .kpi-mini-icon.green  { background:#10b981; }
        .kpi-mini-icon.purple { background:#8b5cf6; }
        .kpi-mini-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:3px; }
        .kpi-mini-value { font-size:22px; font-weight:700; color:var(--text-primary); line-height:1; }

        /* ── Grid de classes ── */
        .classes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:16px; }

        /* ── Card de classe ── */
        .classe-card {
            background:var(--secondary-color);
            border:1px solid var(--border-color);
            border-radius:14px;
            box-shadow:var(--card-shadow);
            cursor:pointer;
            transition:box-shadow 0.2s, border-color 0.2s, transform 0.15s;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }
        .classe-card:hover {
            box-shadow:0 6px 24px rgba(0,0,0,0.10);
            border-color:var(--quinary-color);
            transform:translateY(-2px);
        }
        .classe-card-body {
            padding:20px 20px 16px;
            display:flex;
            align-items:flex-start;
            gap:16px;
            flex:1;
        }
        .classe-card-icon {
            width:46px; height:46px;
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .classe-card-icon i { font-size:20px; color:#fff; }

        /* Cores dos ícones por classe */
        .cc-slate  { background:#64748b; }
        .cc-blue   { background:#3b82f6; }
        .cc-green  { background:#10b981; }
        .cc-indigo { background:#6366f1; }
        .cc-cyan   { background:#06b6d4; }
        .cc-violet { background:#7c3aed; }
        .cc-purple { background:#a855f7; }
        .cc-pink   { background:#ec4899; }
        .cc-orange { background:#f97316; }
        .cc-amber  { background:#f59e0b; }

        .classe-card-info { flex:1; min-width:0; }
        .classe-card-nome { font-size:15px; font-weight:700; color:var(--text-primary); margin-bottom:3px; }
        .classe-card-desc { font-size:12px; color:var(--text-muted); line-height:1.4; }

        .classe-card-footer {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 20px 14px;
            gap:8px;
        }
        .classe-card-stats { display:flex; gap:12px; }
        .stat-pill {
            display:flex; align-items:center; gap:5px;
            background:var(--background-color);
            border:1px solid var(--border-color);
            border-radius:20px;
            padding:3px 10px;
            font-size:11px; font-weight:600; color:var(--text-muted);
        }
        .stat-pill i { font-size:10px; }
        .stat-pill.active { color:var(--quinary-color); border-color:var(--quinary-color); background:rgba(62,96,143,0.07); }

        .classe-card-arrow {
            width:28px; height:28px;
            border-radius:8px;
            background:var(--background-color);
            border:1px solid var(--border-color);
            display:flex; align-items:center; justify-content:center;
            color:var(--text-muted);
            font-size:12px;
            transition:background 0.15s, color 0.15s;
            flex-shrink:0;
        }
        .classe-card:hover .classe-card-arrow {
            background:var(--quinary-color);
            color:#fff;
            border-color:var(--quinary-color);
        }

        /* Badge "sem enums" */
        .sem-enums-badge {
            font-size:10px; font-weight:600;
            color:#94a3b8;
            background:var(--background-color);
            border:1px solid var(--border-color);
            border-radius:4px;
            padding:2px 6px;
            letter-spacing:0.3px;
        }

        /* ── Estados de página ── */
        .page-loading { display:flex; align-items:center; justify-content:center; padding:80px 20px; flex-direction:column; gap:14px; color:var(--text-muted); }
        .page-loading .spinner { width:34px; height:34px; border:3px solid var(--border-color); border-top-color:var(--quinary-color); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .page-error { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:12px; color:var(--text-muted); text-align:center; }
        .page-error i { font-size:38px; color:#ef4444; opacity:0.7; }
        .page-error h3 { font-size:16px; font-weight:700; color:var(--text-primary); }
        .page-error p  { font-size:13px; max-width:340px; line-height:1.5; }

        /* ── Toast ── */
        .toast { position:fixed; bottom:24px; right:24px; background:#1e293b; color:#fff; border-radius:10px; padding:12px 18px; display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:9999; transform:translateY(100px); opacity:0; transition:transform 0.3s ease,opacity 0.3s ease; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast i { font-size:16px; }
        .toast.success i { color:#10b981; }
        .toast.error   i { color:#ef4444; }
        .toast.warning i { color:#f59e0b; }

        /* ── Sidebar footer / avatar ── */
        .sidebar-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid #2d3f55; font-size:11px; color:#475569; }
        .btn-logout { display:flex; align-items:center; gap:6px; padding:5px 10px; background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; transition:0.2s; text-decoration:none; }
        .btn-logout:hover { background:rgba(239,68,68,0.22); color:#fca5a5; }
        .header-user { display:flex; align-items:center; gap:10px; }
        .user-avatar { width:34px; height:34px; background:var(--quinary-color); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; cursor:pointer; flex-shrink:0; }

        /* ── Dark overrides ── */
        body.dark .search-inline { background:#1c2128; border-color:#30363d; }
        body.dark .search-inline input { color:var(--text-primary); }
        body.dark .kpi-mini { background:#161b22; border-color:#30363d; }
        body.dark .classe-card { background:#161b22; border-color:#30363d; }
        body.dark .classe-card:hover { border-color:var(--quinary-color); }
        body.dark .stat-pill { background:#1c2128; border-color:#30363d; }
        body.dark .stat-pill.active { background:rgba(62,96,143,0.15); }
        body.dark .classe-card-arrow { background:#1c2128; border-color:#30363d; }
        body.dark .toast { background:#22272e; border:1px solid #30363d; }
        body.dark .sem-enums-badge { background:#1c2128; border-color:#30363d; }
    
        </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <button id="toggleSidebar" class="toggle-btn">
            <i class="fa-solid fa-angles-left icon-close"></i>
            <i class="fa-solid fa-angles-right icon-open"></i>
        </button>
        <div class="sidebar-brand">
            <img src="novatech-logo.png" alt="NovaTech Solutions" style="height:36px;width:auto;">
            <h2>NovaTech Solutions</h2>
        </div>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="sidebarSearch" placeholder="Buscar..." autocomplete="off">
            <i class="fa-solid fa-xmark clear-btn"></i>
        </div>
        <ul class="menu">
            <li><a data-tooltip="Dashboard" href="dashboard.html"><i class="material-icons" style="font-size:18px">dashboard</i><span>Dashboard</span></a></li>
            <li><a data-tooltip="Inventário" href="estoque.html"><i class="fa-solid fa-box-archive"></i><span>Inventário</span></a></li>
            <li><a data-tooltip="Produtos" href="produtos.html"><i class="fa-solid fa-tag"></i><span>Produtos</span></a></li>
            <li><a data-tooltip="Relatórios" href="relatorios.html"><i class="fa-solid fa-file-lines"></i><span>Relatórios</span></a></li>
            <li><a data-tooltip="Configurações" href="configuracoes.html"><i class="fa-solid fa-gear"></i><span>Configurações</span></a></li>
        </ul>
        
    </div>

    <!-- MAIN -->
    <main>
        <header>
            <h1>Produtos</h1>
            <div class="header-buttons">
                <div class="header-user">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fa-solid fa-sun"></i>
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <button class="btn-config" onclick="window.location.href='configuracoes.html'">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <div class="profile-wrap" id="profileWrap">
                <div class="user-avatar" id="userAvatar" onclick="toggleProfileDropdown()" style="width:34px;height:34px;background:var(--quinary-color);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;">U</div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-header">
                        <div class="pd-name" id="pdName">Usuário</div>
                        <div class="pd-role">Administrador</div>
                    </div>
                    <div class="profile-dropdown-body">
                        <a class="pd-btn" href="perfil.html"><i class="fa-solid fa-user"></i> Meu Perfil</a>
                        <a class="pd-btn danger" href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Encerrar Sessão</a>
                    </div>
                </div>
            </div>
                </div>
            </div>
        </header>

        <div class="main">

            <!-- KPIs -->
            <div class="kpi-row">
                <div class="kpi-mini">
                    <div class="kpi-mini-icon blue"><i class="fa-solid fa-cubes"></i></div>
                    <div class="kpi-mini-body">
                        <div class="kpi-mini-label">Classes de Produto</div>
                        <div class="kpi-mini-value" id="kpi-classes">—</div>
                    </div>
                </div>
                <div class="kpi-mini">
                    <div class="kpi-mini-icon green"><i class="fa-solid fa-list"></i></div>
                    <div class="kpi-mini-body">
                        <div class="kpi-mini-label">Tipos de Enum</div>
                        <div class="kpi-mini-value" id="kpi-tipos">—</div>
                    </div>
                </div>
                <div class="kpi-mini">
                    <div class="kpi-mini-icon purple"><i class="fa-solid fa-tags"></i></div>
                    <div class="kpi-mini-body">
                        <div class="kpi-mini-label">Total de Opções</div>
                        <div class="kpi-mini-value" id="kpi-total">—</div>
                    </div>
                </div>
            </div>

            <!-- Controles -->
            <div class="prod-controls" style="margin-bottom:4px;">
                <div class="prod-controls-left">
                    <div class="search-inline">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Buscar classe de produto...">
                    </div>
                </div>
            </div>

            <!-- Grid de classes -->
            <div id="areaConteudo">
                <div class="page-loading" id="estadoCarregando">
                    <div class="spinner"></div>
                    <span>Carregando dados do servidor...</span>
                </div>
            </div>

        </div>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMsg">Operação realizada com sucesso!</span>
    </div>

    <!-- Scripts -->
        <script src="js/dropdown.js"></script>
    <script src="js/api.js"></script>
    <script src="js/produtos.js"></script>
    <script>
    // ============================================================
    //  TEMA & SIDEBAR
    // ============================================================
    (function () {
        const saved = localStorage.getItem('tl_theme') || 'light';
        if (saved === 'dark') document.body.classList.add('dark');
        const btn = document.getElementById('themeToggle');
        if (btn) {
            if (saved === 'light') btn.classList.add('light');
            btn.addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark');
                btn.classList.toggle('light', !isDark);
                localStorage.setItem('tl_theme', isDark ? 'dark' : 'light');
            });
        }
        const userData = JSON.parse(localStorage.getItem('tl_user') || '{}');
        if (userData.nome) {
        }
    })();

    const sidebar = document.getElementById('sidebar');
    document.getElementById('toggleSidebar').addEventListener('click', () => sidebar.classList.toggle('closed'));
    document.querySelector('.clear-btn')?.addEventListener('click', () => {
        document.querySelector('.search-box input').value = '';
    });

    const currentPage = (window.location.pathname.split('/').pop() || 'produtos.html').split('?')[0];
    document.querySelectorAll('.menu li a').forEach(link => {
        if (link.getAttribute('href') === currentPage) link.parentElement.classList.add('active');
    });

    // ============================================================
    //  TOAST
    // ============================================================
    let toastTimer;
    function showToast(msg, tipo = 'success') {
        const toast    = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toastIco = document.getElementById('toastIcon');
        toastMsg.textContent = msg;
        toast.className = 'toast ' + tipo;
        const icones = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation' };
        toastIco.className = 'fa-solid ' + (icones[tipo] || 'fa-circle-check');
        void toast.offsetWidth;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3400);
    }

    // ============================================================
    //  KPIs
    // ============================================================
    function atualizarKPIs(classes) {
        const totalClasses = classes.length;
        const totalTipos   = classes.reduce((s, c) => s + c.totalEnums, 0);
        const totalOpcoes  = classes.reduce((s, c) => s + c.totalOpcoes, 0);
        document.getElementById('kpi-classes').textContent = totalClasses;
        document.getElementById('kpi-tipos').textContent   = totalTipos;
        document.getElementById('kpi-total').textContent   = totalOpcoes;
    }

    // ============================================================
    //  RENDERIZAÇÃO DOS CARDS DE CLASSE
    // ============================================================
    function esc(str) {
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/"/g,'&quot;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/'/g,'&#39;');
    }

    function renderClasseCard(cls) {
        const temEnums   = cls.totalEnums > 0;
        const enumLabel  = cls.totalEnums === 1 ? '1 tipo de enum' : cls.totalEnums + ' tipos de enum';
        const opcLabel   = cls.totalOpcoes === 1 ? '1 opção' : cls.totalOpcoes + ' opções';

        const statsHtml = temEnums
            ? `<div class="stat-pill active"><i class="fa-solid fa-list"></i>${esc(enumLabel)}</div>
               <div class="stat-pill active"><i class="fa-solid fa-tags"></i>${esc(opcLabel)}</div>`
            : `<span class="sem-enums-badge">Sem enums dinâmicos</span>`;

        return `<div class="classe-card" onclick="abrirClasse('${esc(cls.id)}')" title="Abrir configurações de ${esc(cls.nome)}">
            <div class="classe-card-body">
                <div class="classe-card-icon cc-${esc(cls.cor)}">
                    <i class="fa-solid ${esc(cls.icone)}"></i>
                </div>
                <div class="classe-card-info">
                    <div class="classe-card-nome">${esc(cls.nome)}</div>
                    <div class="classe-card-desc">${esc(cls.descricao)}</div>
                </div>
            </div>
            <div class="classe-card-footer">
                <div class="classe-card-stats">${statsHtml}</div>
                <div class="classe-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </div>
        </div>`;
    }

    function renderGrid(classes) {
        const area = document.getElementById('areaConteudo');

        if (classes.length === 0) {
            area.innerHTML =
                '<div class="page-error" style="color:var(--text-muted);">' +
                  '<i class="fa-solid fa-magnifying-glass" style="color:var(--text-muted);opacity:0.3;"></i>' +
                  '<h3>Nenhuma classe encontrada</h3>' +
                  '<p>Ajuste a busca para encontrar uma classe de produto.</p>' +
                '</div>';
            return;
        }

        area.innerHTML = '<div class="classes-grid">' + classes.map(renderClasseCard).join('') + '</div>';
    }

    // ============================================================
    //  FILTRO POR NOME DE CLASSE
    // ============================================================
    function filtrarERerender() {
        const q       = (document.getElementById('searchInput').value || '').toLowerCase().trim();
        const classes = Produtos.getClasses();
        const filtradas = q
            ? classes.filter(c =>
                c.nome.toLowerCase().includes(q) ||
                c.descricao.toLowerCase().includes(q)
              )
            : classes;

        renderGrid(filtradas);
        atualizarKPIs(classes); // KPIs sempre refletem o total real
    }

    document.getElementById('searchInput').addEventListener('input', filtrarERerender);

    // ============================================================
    //  NAVEGAÇÃO PARA DETALHE DA CLASSE
    // ============================================================
    function abrirClasse(classeId) {
        window.location.href = 'produto-detalhe.html?classe=' + encodeURIComponent(classeId);
    }

    window.abrirClasse = abrirClasse;

    // ============================================================
    //  INICIALIZAÇÃO
    // ============================================================
    async function inicializar() {
        const area = document.getElementById('areaConteudo');
        try {
            await Produtos.carregarEnums();
            filtrarERerender();
        } catch (err) {
            area.innerHTML =
                '<div class="page-error">' +
                  '<i class="fa-solid fa-triangle-exclamation"></i>' +
                  '<h3>Não foi possível carregar os dados</h3>' +
                  '<p>Verifique se o servidor está rodando e tente novamente.</p>' +
                  '<button class="btn btn-outline" onclick="location.reload()" style="margin-top:8px">' +
                    '<i class="fa-solid fa-rotate-right"></i> Tentar novamente' +
                  '</button>' +
                '</div>';
            atualizarKPIs([]);
        }
    }

    inicializar();
    
        // ── Dropdown de Perfil ───────────────────────────────
        function toggleProfileDropdown() {
            document.getElementById('profileDropdown').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var wrap = document.getElementById('profileWrap');
            var dd   = document.getElementById('profileDropdown');
            if (dd && dd.classList.contains('open') && wrap && !wrap.contains(e.target)) {
                dd.classList.remove('open');
            }
        });
        try {
            var u = JSON.parse(localStorage.getItem('tl_user') || '{}');
            if (u.nome) {
                var av = document.getElementById('userAvatar');
                if (av) av.textContent = u.nome.charAt(0).toUpperCase();
                var pn = document.getElementById('pdName');
                if (pn) pn.textContent = u.nome;
            }
        } catch(e) {}
</script>
</body>
</html>
