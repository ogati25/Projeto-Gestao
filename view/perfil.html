<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="novatech-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <title>Perfil — NovaTech Solutions</title>
    <style>
        /* ---- Logout / Avatar (padrão) ---- */
        .sidebar-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 12px; border-top: 1px solid #2d3f55;
            font-size: 11px; color: #475569;
        }
        .btn-logout {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px;
            background: rgba(239,68,68,0.12); color: #f87171;
            border: 1px solid rgba(239,68,68,0.2); border-radius: 6px;
            font-size: 11px; font-weight: 700; cursor: pointer;
            transition: 0.2s; text-decoration: none;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.22); color: #fca5a5; }
        .header-user { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 34px; height: 34px; background: var(--quinary-color);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; flex-shrink: 0;
        }

        /* ==================== PERFIL ==================== */
        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            align-items: start;
        }

        /* ---- Tablet: lado a lado mas mais compacto ---- */
        @media (max-width: 900px) {
            .profile-layout {
                grid-template-columns: 240px 1fr;
                gap: 14px;
            }
        }

        /* ---- Mobile: foto ao lado das infos ---- */
        @media (max-width: 680px) {
            .profile-layout {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .profile-card {
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: flex-start !important;
                text-align: left !important;
                gap: 16px !important;
                padding: 16px !important;
            }
            .avatar-wrap { flex-shrink: 0; width: 70px !important; height: 70px !important; }
            .avatar-big { width: 70px !important; height: 70px !important; font-size: 26px !important; }
            .profile-card-info { align-items: flex-start !important; }
            .profile-name { font-size: 15px !important; }
            .profile-stat-list { width: 100%; }
            .form-grid { grid-template-columns: 1fr !important; }
            .pfc-body { padding: 16px !important; }
            .pfc-header { padding: 12px 16px !important; }
        }

        /* ---- XS: muito pequeno ---- */
        @media (max-width: 360px) {
            .avatar-wrap { width: 55px !important; height: 55px !important; }
            .avatar-big { width: 55px !important; height: 55px !important; font-size: 20px !important; }
            .profile-name { font-size: 13px !important; }
        }

        /* ---- Card do avatar ---- */
        .profile-card {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .profile-card-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .avatar-wrap {
            position: relative;
            width: 90px;
            height: 90px;
        }
        .avatar-big {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--quinary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
        }
        .avatar-edit-btn {
            position: absolute;
            bottom: 0; right: 0;
            width: 26px; height: 26px;
            background: var(--quinary-hover);
            border: 2px solid var(--secondary-color);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 11px; color: #fff;
            transition: background 0.2s;
        }
        .avatar-edit-btn:hover { background: var(--quinary-color); }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .profile-role {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: -8px;
        }
        .profile-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        body.dark .profile-badge { background: #1e3a5f; color: #60a5fa; }

        .profile-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2px 0;
        }

        .profile-stat-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .profile-stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        .profile-stat-item .psi-label {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .profile-stat-item .psi-label i { width: 14px; text-align: center; font-size: 12px; }
        .profile-stat-item .psi-val {
            font-weight: 700;
            color: var(--text-primary);
            max-width: 160px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* ---- Formulário de edição ---- */
        .profile-form-card {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: visible;
        }
        .pfc-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pfc-header h3 { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        .pfc-header p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .pfc-body { padding: 24px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
        }
        .form-grid .fg-full { grid-column: 1 / -1; }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .fg label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
        }
        .fg input, .fg select {
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            background: var(--background-color);
            color: var(--text-primary);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .fg input:focus, .fg select:focus {
            border-color: var(--quinary-color);
            box-shadow: 0 0 0 3px rgba(62,96,143,0.12);
            background: var(--secondary-color);
        }
        .fg input:read-only {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Seção de senha */
        .section-divider {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0;
        }
        .section-divider span {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .fg-pass { position: relative; }
        .fg-pass input { padding-right: 38px; }
        .fg-pass .eye-btn {
            position: absolute;
            right: 10px; bottom: 9px;
            background: none; border: none;
            cursor: pointer; color: var(--text-muted);
            font-size: 13px; transition: color 0.2s;
        }
        .fg-pass .eye-btn:hover { color: var(--text-primary); }

        /* Ações */
        .pfc-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .pfc-footer-left { font-size: 12px; color: var(--text-muted); }
        .pfc-footer-right { display: flex; gap: 8px; }

        /* Alerta */
        .alert-strip {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .alert-strip.show { display: flex; }
        .alert-success { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
        .alert-error   { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
    
        </style>
    <script src="js/dropdown.js"></script>
    <script src="js/sidebar.js" defer></script>
</head>
<body>

    <!-- SIDEBAR -->
<div id="sidebar-container"></div>

    <main id="mainContent">
        <header>
            <button class="btn-hamburger" id="btnHamburger" onclick="toggleMobileSidebar()"><i class="fa-solid fa-bars"></i></button>
            <h1>Meu Perfil</h1>
            <div class="header-buttons">
                <div class="header-user">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fa-solid fa-sun icon-sun"></i>
                        <i class="fa-solid fa-moon icon-moon"></i>
                    </button>
                    <div class="profile-wrap" id="profileWrap">
                <div class="user-avatar" id="userAvatar" onclick="toggleProfileDropdown()" style="width:34px;height:34px;background:var(--quinary-color);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;">U</div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-header">
                        <div class="pd-name" id="pdName">Usuário</div>
                        <div class="pd-role">Administrador</div>
                    </div>
                    <div class="profile-dropdown-body">
                        <a class="pd-btn" href="perfil.html"><i class="fa-solid fa-user"></i> Meu Perfil</a>
                        <a class="pd-btn danger" href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Encerrar Sessão</a>
                    </div>
                </div>
            </div>
                </div>
            </div>
        </header>

        <div class="main">

            <div class="profile-layout">

                <!-- Card lateral -->
                <div class="profile-card">
                    <div class="avatar-wrap">
                        <div class="avatar-big" id="avatarBig">U</div>
                        <div class="avatar-edit-btn" title="Alterar foto"><i class="fa-solid fa-camera"></i></div>
                    </div>
                    <div class="profile-card-info">
                        <div>
                            <div class="profile-name" id="sidebarName">Carregando...</div>
                        </div>
                        <span class="profile-badge"><i class="fa-solid fa-building"></i> <span id="sidebarNivel">—</span></span>
                        <hr class="profile-divider">
                        <div class="profile-stat-list">
                            <div class="profile-stat-item">
                                <span class="psi-label"><i class="fa-solid fa-envelope"></i> E-mail</span>
                                <span class="psi-val" id="sidebarEmail">—</span>
                            </div>
                            <div class="profile-stat-item">
                                <span class="psi-label"><i class="fa-solid fa-building"></i> Setor</span>
                                <span class="psi-val" id="sidebarSetor">—</span>
                            </div>
                            <div class="profile-stat-item">
                                <span class="psi-label"><i class="fa-solid fa-calendar"></i> Membro desde</span>
                                <span class="psi-val" id="sidebarMembro">—</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Formulário -->
                <div>
                    <div class="profile-form-card">
                        <div class="pfc-header">
                            <div>
                                <h3>Informações pessoais</h3>
                                <p>Atualize seus dados de perfil e senha</p>
                            </div>
                        </div>
                        <div class="pfc-body">

                            <div class="alert-strip alert-success" id="alertOk">
                                <i class="fa-solid fa-circle-check"></i> Perfil atualizado com sucesso!
                            </div>
                            <div class="alert-strip alert-error" id="alertErr">
                                <i class="fa-solid fa-circle-exclamation"></i> <span id="alertErrMsg">Erro ao salvar.</span>
                            </div>

                            <div class="form-grid">
                                <div class="fg">
                                    <label>Nome</label>
                                    <input type="text" id="fNome" placeholder="João">
                                </div>
                                <div class="fg">
                                    <label>Sobrenome</label>
                                    <input type="text" id="fSobrenome" placeholder="Silva">
                                </div>
                                <div class="fg">
                                    <label>E-mail</label>
                                    <input type="email" id="fEmail" placeholder="joao@empresa.com">
                                </div>
                                <div class="fg">
                                    <label>Telefone</label>
                                    <input type="tel" id="fTelefone" placeholder="(11) 99999-9999">
                                </div>
                                <div class="fg">
                                    <label>Setor / Departamento</label>
                                    <input type="text" id="fSetor" placeholder="Tecnologia da Informação">
                                </div>

                                <!-- Separador senha -->
                                <div class="section-divider"><span>Alterar Senha</span></div>

                                <div class="fg fg-pass">
                                    <label>Senha atual</label>
                                    <input type="password" id="fSenhaAtual" placeholder="••••••••">
                                    <button type="button" class="eye-btn" onclick="togglePwd('fSenhaAtual',this)"><i class="fa-solid fa-eye"></i></button>
                                </div>
                                <div class="fg"></div>
                                <div class="fg fg-pass">
                                    <label>Nova senha</label>
                                    <input type="password" id="fNovaSenha" placeholder="Mínimo 8 caracteres">
                                    <button type="button" class="eye-btn" onclick="togglePwd('fNovaSenha',this)"><i class="fa-solid fa-eye"></i></button>
                                </div>
                                <div class="fg fg-pass">
                                    <label>Confirmar nova senha</label>
                                    <input type="password" id="fConfirmarSenha" placeholder="Repita a nova senha">
                                    <button type="button" class="eye-btn" onclick="togglePwd('fConfirmarSenha',this)"><i class="fa-solid fa-eye"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="pfc-footer">
                            <span class="pfc-footer-left">Última atualização: <span id="ultimaAtualizacao">—</span></span>
                            <div class="pfc-footer-right">
                                <button class="btn btn-outline" onclick="carregarDados()">
                                    <i class="fa-solid fa-rotate-left"></i> Cancelar
                                </button>
                                <button class="btn btn-primary" onclick="salvarPerfil()">
                                    <i class="fa-solid fa-floppy-disk"></i> Salvar alterações
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        // ── TOGGLE SENHA ──────────────────────────────────────────────────────
        function togglePwd(id, btn) {
            const inp  = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';     icon.className = 'fa-solid fa-eye-slash';
            } else {
                inp.type = 'password'; icon.className = 'fa-solid fa-eye';
            }
        }

        // ── SETORES ───────────────────────────────────────────────────────────
        const SETORES = [
            { value: 'RH',         label: 'RH'         },
            { value: 'Suporte',    label: 'Suporte'     },
            { value: 'Produtos',   label: 'Produtos'    },
            { value: 'Auditoria',  label: 'Auditoria'   },
            { value: 'Diretoria',  label: 'Diretoria'   },
            { value: 'CallCenter', label: 'Call Center' },
            { value: 'Dev',        label: 'Dev'         },
            { value: 'Cofre',      label: 'Cofre'       },
            { value: 'Servidor',   label: 'Servidor'    },
        ];

        let _usuarioAtual = null;

        // ── HELPERS ───────────────────────────────────────────────────────────
        function _norm(u) {
            if (!u) return null;
            return {
                id:        u.id        ?? u.Id        ?? null,
                nome:      u.nome      ?? u.Nome      ?? '',
                sobrenome: u.sobrenome ?? u.Sobrenome ?? '',
                email:     u.email     ?? u.Email     ?? '',
                setor:     u.setor     ?? u.Setor     ?? '',
                criadoEm:  u.criadoEm  ?? u.CriadoEm  ?? null,
            };
        }

        function _v(id, val) { const el = document.getElementById(id); if (el) el.value       = val ?? ''; }
        function _t(id, val) { const el = document.getElementById(id); if (el) el.textContent = val ?? ''; }
        function _dtHora(d)  { return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

        // ── POPULAR SETORES ───────────────────────────────────────────────────
        function popularSetores() {
            const sel = document.getElementById('fSetor');
            if (!sel) return;
            sel.innerHTML = SETORES.map(s => `<option value="${s.value}">${s.label}</option>`).join('');
        }

        // ── CARREGAR DADOS DA API ─────────────────────────────────────────────
        async function carregarDados() {
            const u = JSON.parse(localStorage.getItem('tl_user') || '{}');
            const id = u.id ?? u.Id;
            if (!id) { window.location.href = 'login.html'; return; }

            try {
                const raw     = await getUsuario(id);
                const usuario = _norm(raw);
                _usuarioAtual = usuario;

                // Atualiza localStorage com dados frescos da API
                localStorage.setItem('tl_user', JSON.stringify({ ...u, ...usuario }));

                // Preenche card lateral
                const nomeCompleto = [usuario.nome, usuario.sobrenome].filter(Boolean).join(' ') || 'Usuário';
                const ini = nomeCompleto.charAt(0).toUpperCase();
                _t('avatarBig',    ini);
                _t('sidebarName',  nomeCompleto);
                _t('sidebarEmail', usuario.email  || '—');
                _t('sidebarSetor', usuario.setor  || '—');
                _t('sidebarNivel', 'Usuário');
                const av = document.getElementById('userAvatar');
                if (av) av.textContent = ini;
                if (usuario.criadoEm) {
                    _t('sidebarMembro', new Date(usuario.criadoEm).toLocaleDateString('pt-BR'));
                }

                // Preenche formulário
                popularSetores();
                _v('fNome',      usuario.nome);
                _v('fSobrenome', usuario.sobrenome);
                _v('fEmail',     usuario.email);
                const sel = document.getElementById('fSetor');
                if (sel) sel.value = usuario.setor || '';

                const salvo = localStorage.getItem('tl_perfil_ultima_atualizacao');
                _t('ultimaAtualizacao', salvo ?? 'Nunca');

            } catch (err) {
                if (err.status === 401) {
                    localStorage.removeItem('tl_token');
                    localStorage.removeItem('tl_user');
                    window.location.href = 'login.html';
                } else {
                    console.error('Erro ao carregar perfil:', err);
                }
            }
        }

        // ── SALVAR DADOS PESSOAIS ─────────────────────────────────────────────
        async function salvarPerfil() {
            if (!_usuarioAtual) return;

            const alertOk  = document.getElementById('alertOk');
            const alertErr = document.getElementById('alertErr');
            const errMsg   = document.getElementById('alertErrMsg');
            alertOk?.classList.remove('show');
            alertErr?.classList.remove('show');

            const nome      = document.getElementById('fNome')?.value.trim()      || '';
            const sobrenome = document.getElementById('fSobrenome')?.value.trim() || '';
            const email     = document.getElementById('fEmail')?.value.trim()     || '';
            const novaSenha = document.getElementById('fNovaSenha')?.value        || '';
            const confirmar = document.getElementById('fConfirmarSenha')?.value   || '';
            const setor     = document.getElementById('fSetor')?.value            || '';

            if (!nome || !email) {
                if (errMsg) errMsg.textContent = 'Nome e e-mail são obrigatórios.';
                alertErr?.classList.add('show'); return;
            }
            if (novaSenha && novaSenha !== confirmar) {
                if (errMsg) errMsg.textContent = 'As novas senhas não coincidem.';
                alertErr?.classList.add('show'); return;
            }
            if (novaSenha && novaSenha.length < 8) {
                if (errMsg) errMsg.textContent = 'A nova senha deve ter pelo menos 8 caracteres.';
                alertErr?.classList.add('show'); return;
            }

            try {
                // Atualiza dados pessoais
                if (nome !== _usuarioAtual.nome || sobrenome !== _usuarioAtual.sobrenome || setor !== _usuarioAtual.setor) {
                    await atualizarDadosPessoais(_usuarioAtual.id, { nome, sobrenome, setor });
                }
                // Atualiza email
                if (email !== _usuarioAtual.email) {
                    await atualizarEmail(_usuarioAtual.id, email);
                }
                // Atualiza senha
                if (novaSenha) {
                    await atualizarSenha(_usuarioAtual.id, novaSenha);
                    ['fSenhaAtual','fNovaSenha','fConfirmarSenha'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.value = '';
                    });
                }

                localStorage.setItem('tl_perfil_ultima_atualizacao', _dtHora(new Date()));
                await carregarDados();
                alertOk?.classList.add('show');
                setTimeout(() => alertOk?.classList.remove('show'), 3500);

            } catch (err) {
                if (errMsg) errMsg.textContent = err.status === 400
                    ? 'Este e-mail já está em uso.' : 'Erro ao salvar. Tente novamente.';
                alertErr?.classList.add('show');
            }
        }

        // ── INIT ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
    <script src="js/mobile.js"></script>
</body>
</html>
