<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Categorias</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f11;
      --surface:   #18181c;
      --border:    #2a2a30;
      --accent:    #c8f135;
      --accent-dim:#8fb020;
      --text:      #e8e8ea;
      --muted:     #6b6b74;
      --danger:    #ff5c5c;
      --warn:      #ffb84d;
      --ok:        #4dffab;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 2rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    /* ── NAV ── */
    .nav-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: 1.75rem;
    }
    .nav-scroll::-webkit-scrollbar { display: none; }

    .nav-bar {
      display: flex;
      gap: 4px;
      min-width: max-content;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px;
    }

    .nav-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-btn:hover { color: var(--text); background: #242428; }
    .nav-btn.active {
      background: var(--accent);
      color: #0f0f11;
    }

    /* ── TABLE CONTAINER ── */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 1.1rem 1.5rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .table-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .table-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.75rem 1.5rem;
      text-align: left;
      background: #141418;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1e1e24; }

    tbody td {
      padding: 0.85rem 1.5rem;
      color: var(--text);
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
    }
    .badge-ok      { background: #0d3324; color: var(--ok); }
    .badge-warn    { background: #332a10; color: var(--warn); }
    .badge-danger  { background: #2e1414; color: var(--danger); }
    .badge-neutral { background: #222228; color: var(--muted); }

    /* ── FADE IN ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .table-container { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>

<h1>Painel de Categorias</h1>

<div class="nav-scroll">
  <div class="nav-bar" id="nav"></div>
</div>

<div id="table-area"></div>

        ["Vendas Q1 2026",   "Ana Lima",       "01/04/2026", "PDF"],

  /* ===================================================== */

  let activeIndex = 0;

  function cellHTML(cell) {
    if (cell && typeof cell === 'object' && cell.label) {
      return `<span class="badge badge-${cell.type}">${cell.label}</span>`;
    }
    return cell;
  }

  function render() {
    /* nav */
    document.getElementById('nav').innerHTML = categories.map((cat, i) =>
      `<button class="nav-btn${i === activeIndex ? ' active' : ''}" onclick="setActive(${i})">${cat.label}</button>`
    ).join('');

    /* table */
    const cat = categories[activeIndex];
    const thead = cat.cols.map(c => `<th>${c}</th>`).join('');
    const tbody = cat.rows.map(row =>
      `<tr>${row.map(cell => `<td>${cellHTML(cell)}</td>`).join('')}</tr>`
    ).join('');

    document.getElementById('table-area').innerHTML = `
      <div class="table-container">
        <div class="table-header">
          <span class="table-title">${cat.label}</span>
          <span class="table-count">${cat.rows.length} registros</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>`;
  }

  window.setActive = function(i) {
    activeIndex = i;
    render();
  };

  render();
</script>
</body>
</html>
