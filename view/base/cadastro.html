<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGO - Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        
        /* Cabeçalho */
        .header {
            background: linear-gradient(135deg, #1f3fcc 0%, #448ed3 100%);
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: relative;
            overflow: hidden;
        }
        .user-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: auto;
            z-index: 1;
        }
        .user-icon {
            width: 50px;
            height: 50px;
            background-color: #1e3a8a;
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
        }
        .user-icon::before {
            content: '';
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 10%;
        }
        .user-icon::after {
            content: '';
            width: 30px;
            height: 15px;
            background-color: white;
            border-radius: 15px 15px 0 0;
            position: absolute;
            bottom: 19%;
        }
        .cadastro-text {
            color: #1e3a8a;
            font-size: 18px;
            font-weight: 600;
        }

        /* Formulário */
        .form-container {
            background-color: white;
            min-height: 67vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .form-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }
        .form-title {
            text-align: center;
            color: #374151;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            color: #4b5563;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .required {
            color: #ef4444;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: white;
        }
        .form-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .form-input::placeholder {
            color: #9ca3af;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }
        .btn-primary {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #357abd;
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        .btn-secondary:hover {
            color: #374151;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }
        .login-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
                height: 30vh;
            }

            .logo {
                font-size: 36px;
            }

            .form-card {
                padding: 30px 20px;
                margin: 0 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
        @media (max-width: 480px) {
            .header {
                padding: 0 15px;
            }

            .logo {
                font-size: 32px;
            }

            .user-icon {
                width: 40px;
                height: 40px;
            }

            .form-card {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-section">
            <div class="user-icon"></div>
            <div class="cadastro-text">Cadastro</div>
        </div>
    </div>

    <div class="form-container">
        <div class="form-card">
            <h2 class="form-title">Criar Nova Conta</h2>
            <form method="POST" action="{{ url_for('auth.realizar_cadastro') }}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">
                            Nome <span class="required">*</span>
                        </label>
                        <input type="text" name="nome" class="form-input" placeholder="Digite seu nome" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            Sobrenome <span class="required">*</span>
                        </label>
                        <input type="text" name="sobrenome" class="form-input" placeholder="Digite seu sobrenome" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        E-mail <span class="required">*</span>
                    </label>
                    <input type="email" name="email" class="form-input" placeholder="Digite seu e-mail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        CPF <span class="required">*</span>
                    </label>
                    <input type="text" name="cpf" class="form-input" placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Telefone <span class="required">*</span>
                    </label>
                    <input type="tel" name="telefone" class="form-input" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Senha <span class="required">*</span>
                    </label>
                    <input type="password" name="senha" class="form-input" placeholder="Digite sua senha" minlength="6" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Confirmar Senha <span class="required">*</span>
                    </label>
                    <input type="password" name="confirmarSenha" class="form-input" placeholder="Confirme sua senha" minlength="6" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">
                        Criar Conta
                    </button>
                </div>
                <div class="login-link">
                    Já tem uma conta? <a href="{{ url_for('auth.login') }}">Faça login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Mensagens Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
